name: Build and publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  publish:
    name: Build and Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: ⚙️ Generate Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
            images: ghcr.io/creeperkatze/modrinth-scout
            tags: |
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
                type=semver,pattern={{major}}
            labels: |
                org.opencontainers.image.title=modrinth-scout
                org.opencontainers.image.description=Yet another Discord bot for discovering, exploring and tracking projects on Modrinth.
                org.opencontainers.image.licenses=AGPL-3.0-only
                org.opencontainers.image.source=https://github.com/creeperkatze/modrinth-scout
            annotations: |
                org.opencontainers.image.title=modrinth-scout
                org.opencontainers.image.description=Yet another Discord bot for discovering, exploring and tracking projects on Modrinth.
                org.opencontainers.image.licenses=AGPL-3.0-only
      - name: 🔑 Login to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: 🔨 Build and push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
